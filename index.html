<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Game Skill Tree</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚔️ Skill Tree</h1>
            <div class="header-controls">
                <button class="toggle-editor-btn" onclick="toggleEditor()">📝 Edit Tree</button>
            </div>
            <div class="stats">
                <div class="stat">
                    <span class="stat-label">Skill Points</span>
                    <span class="stat-value" id="skillPoints">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Total Level</span>
                    <span class="stat-value" id="totalLevel">0</span>
                </div>
            </div>
        </div>

        <!-- Info Section -->
        <div class="info-section" id="infoSection">
            <div class="info-content">
                <p id="infoText">Welcome to the Skill Tree! Allocate skill points to unlock and upgrade abilities.</p>
            </div>
            <button class="edit-info-btn" onclick="toggleInfoEdit()">✏️ Edit</button>
            <div id="infoEditForm" class="info-edit-form hidden">
                <textarea id="infoTextarea" placeholder="Enter your game information here..."></textarea>
                <div class="info-form-actions">
                    <button onclick="saveInfo()" class="save-info-btn">Save</button>
                    <button onclick="toggleInfoEdit()" class="cancel-info-btn">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Editor Panel -->
        <div id="editorPanel" class="editor-panel hidden">
            <div class="editor-header">
                <h2>Skill Tree Editor</h2>
                <button class="close-btn" onclick="toggleEditor()">✕</button>
            </div>

            <div class="editor-content">
                <!-- Class Selector -->
                <div class="editor-section">
                    <h3>Select Class</h3>
                    <div class="class-selector">
                        <button class="class-btn" onclick="selectClass('mage')">🧙 Mage</button>
                        <button class="class-btn" onclick="selectClass('warrior')">⚔️ Warrior</button>
                        <button class="class-btn" onclick="selectClass('rogue')">🗡️ Rogue</button>
                    </div>
                </div>

                <!-- Branch Selector -->
                <div class="editor-section">
                    <h3>Branches in <span id="currentClass">Mage</span></h3>
                    <div class="branch-selector" id="branchSelector"></div>
                    <button class="add-branch-btn" onclick="addNewBranch()">+ Add Branch</button>
                </div>

                <!-- Branch Editor Form -->
                <div class="editor-section" id="branchEditorSection" style="display: none;">
                    <h3>Edit Branch</h3>
                    <form id="branchEditorForm">
                        <div class="form-group">
                            <label>Branch Name</label>
                            <input type="text" id="editBranchName" placeholder="e.g., Offense" required>
                        </div>

                        <div class="form-group">
                            <label>Branch Emoji Icon</label>
                            <input type="text" id="editBranchEmoji" placeholder="e.g., ⚡" maxlength="2" required>
                        </div>

                        <div class="form-actions">
                            <button type="button" onclick="saveBranchEdit()" class="save-btn">Save Branch</button>
                            <button type="button" onclick="cancelBranchEdit()" class="cancel-btn">Cancel</button>
                            <button type="button" id="deleteBranchBtn" onclick="deleteBranch()" class="delete-btn" style="display: none;">Delete Branch</button>
                        </div>
                    </form>
                </div>

                <!-- Skills List -->
                <div class="editor-section">
                    <h3>Skills in <span id="currentBranch">Branch</span></h3>
                    <div id="skillsList" class="skills-list"></div>
                    <button class="add-skill-btn" onclick="addNewSkill()">+ Add Skill</button>
                </div>

                <!-- Skill Editor Form -->
                <div class="editor-section" id="skillEditorSection" style="display: none;">
                    <h3>Edit Skill</h3>
                    <form id="skillEditorForm">
                        <div class="form-group">
                            <label>Skill Name</label>
                            <input type="text" id="editName" placeholder="e.g., Slash" required>
                        </div>

                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="editDescription" placeholder="Describe what this skill does" required></textarea>
                        </div>

                        <div class="form-group">
                            <label>Max Level</label>
                            <input type="number" id="editMaxLevel" min="1" max="100" value="10" required>
                        </div>

                        <div class="form-group">
                            <label>Stat Display (e.g., "Damage: +{level * 5}%")</label>
                            <input type="text" id="editStatDisplay" placeholder="e.g., Damage: +{level * 5}%" required>
                        </div>

                        <div class="form-group">
                            <label>Formula for Stat Value (e.g., "{level * 5}")</label>
                            <input type="text" id="editFormula" placeholder="e.g., {level * 5}" required>
                        </div>

                        <div class="form-group">
                            <label>Skill Points Generated (0 if none)</label>
                            <input type="number" id="editPointsFormula" value="0" min="0" required>
                        </div>

                        <div class="form-group">
                            <label>Prerequisites (leave empty if none)</label>
                            <div id="prerequisitesList" class="prerequisites-list"></div>
                            <button type="button" onclick="addPrerequisite()" class="add-prereq-btn">+ Add Requirement</button>
                        </div>

                        <div class="form-actions">
                            <button type="button" onclick="saveSkillEdit()" class="save-btn">Save Skill</button>
                            <button type="button" onclick="cancelSkillEdit()" class="cancel-btn">Cancel</button>
                            <button type="button" id="deleteSkillBtn" onclick="deleteSkill()" class="delete-btn" style="display: none;">Delete Skill</button>
                        </div>
                    </form>
                </div>

                <!-- Export/Import -->
                <div class="editor-section">
                    <h3>Backup & Restore</h3>
                    <button onclick="exportConfig()" class="export-btn">📥 Export Config</button>
                    <button onclick="importConfigUI()" class="import-btn">📤 Import Config</button>
                    <input type="file" id="importFile" style="display: none;" accept=".json" onchange="importConfig(event)">
                </div>
            </div>
        </div>

        <!-- Game View -->
        <div id="gameView" class="skill-tree-container" style="display: block;"></div>

        <div class="footer">
            <button class="reset-btn" onclick="resetTree()">Reset Tree</button>
            <p class="tip">Tip: Some skills require prerequisites to unlock!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
